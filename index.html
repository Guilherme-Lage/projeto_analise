<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTOQUE HONTEC</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<body>

    <div class="container">
        <h1>Analise Estoque Hontec</h1>

        <div class="linha-botoes">
            <button class="botao" onclick="document.getElementById('entrada-arquivo').click()">Abrir Arquivo</button>
            <button class="botao" id="btn-ocultar" onclick="alternarConferidos()">Mostrar todos</button>
              <button class="botao" id="btn-ocultar-alertas" onclick="alternarAlertas()">Ocultar Alertas</button>
            <button class="botao" onclick="exportarCSV()">⬇ Exportar</button>
            <button class="botao" id="btn-limpar" onclick="limpar()" style="display:none">Novo</button>
        </div>

        <input type="file" id="entrada-arquivo" accept=".csv" onchange="carregarCSV(this)">

        <div class="grupo-busca">
            <select id="filtro-tipo" onchange="filtrar()">
                <option value="todos">TUDO</option>
                <option value="prateleira">ESTANTE</option>
                <option value="locacao">LOCAÇÃO</option>
                <option value="marca">MARCA</option>
                <option value="codigo">CÓDIGO</option>
            </select>

            <div style="position: relative; flex: 1; display: flex; align-items: center;width: 100%;">
                <input type="text" class="barra-busca" id="busca" placeholder="BUSCAR..." oninput="filtrar()"
                    style="padding-right: 35px;">
                <button onclick="voltarListaCompleta()"
                    style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 16px; color: #888;">✕</button>
            </div>
        </div>
        <div class="contador" id="contador">
            <span id="cnt-conf">0</span> / <span id="cnt-total">0</span> itens conferidos
        </div>

        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Locação</th>
                        <th>Marca</th>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>GTIN</th>

                    </tr>
                </thead>
                <tbody id="corpo">
                    <tr>
                        <td colspan="5" class="estado-vazio">Nenhum arquivo carregado — clique em Abrir CSV</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL  -->
    <div class="modal-overlay" id="modal-overlay" onclick="fecharModalFora(event)">
        <div class="modal" id="modal">

            <div class="modal-header">
                <span class="modal-header-titulo">Conferência de Item</span>
                <span class="modal-header-datetime" id="modal-datetime"></span>
                <button class="modal-fechar" onclick="fecharModal()">✕</button>
            </div>

            <div class="modal-body">

                <!-- Linha 1: LOC | MARCA -->
                <div class="modal-row row-loc-marca">
                    <div class="modal-cell">
                        <span class="modal-cell-label">Locação</span>
                        <input class="modal-cell-input" id="modal-locacao">
                    </div>
                    <div class="modal-cell">
                        <span class="modal-cell-label">Marca</span>
                        <input class="modal-cell-input" id="modal-marca" type="text" placeholder="">
                    </div>
                </div>

                <!-- Linha 2: COD + NOME -->
                <div class="modal-row row-cod-nome">
                    <div class="modal-cell">
                        <span class="modal-cell-label">Código + Nome</span>
                        <span class="modal-cell-value" id="modal-cod-nome">—</span>
                    </div>
                </div>



                <!-- Linha 4: GTIN ANTIGO -->
                <div class="modal-row row-gtin">
                    <div class="modal-cell">
                        <span class="modal-cell-label">GTIN Antigo</span>
                        <span class="modal-cell-input" id="modal-gtin-antigo" type="text" placeholder=""></span>
                    </div>
                </div>

                <!-- Linha 5: GTIN NOVO -->
                <div class="modal-row row-gtin">
                    <div class="modal-cell">
                        <span class="modal-cell-label">GTIN Novo</span>
                        <input class="modal-cell-input" id="modal-gtin-novo" type="text" placeholder="">
                    </div>
                </div>

                <!-- Linha 6: QTDO -->
                <div class="modal-row row-qtdo">
                    <div class="modal-cell">
                        <span class="modal-cell-label">Quantidade</span>
                        <input class="modal-cell-input" id="modal-qtdo" type="number" min="0" step="any"
                            placeholder="0">
                    </div>
                </div>

            </div>

            <!-- GALERIA DE FOTOS (múltiplas) -->
            <div class="modal-row row-fotos">
                <div class="modal-cell fotos-cell">
                    <span class="modal-cell-label">Fotos</span>
                    <div class="galeria-fotos" id="galeria-fotos"></div>
                    <button class="btn-adicionar-foto" onclick="document.getElementById('foto-input').click()">+ Adicionar Foto</button>
                    <input type="file" id="foto-input" accept="image/*" multiple onchange="carregarFotos(this)" style="display:none">
                </div>
            </div>

            <div class="modal-actions">
                <button class="modal-btn modal-btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="modal-btn modal-btn-confirmar" id="modal-btn-confirmar"
                    onclick="confirmarModal()">Confirmar</button>
            </div>

        </div>
    </div>

</body>

</html>
