<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTOQUE HONTEC</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: #f0ede8;
            min-height: 100vh;
            padding: 24px 16px;
            color: #1a1a1a;
        }

        .container { max-width: 860px; margin: 0 auto; }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #00009C;
            margin-bottom: 20px;
            text-align: center;
        }

        .linha-botoes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .botao {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            padding: 10px 18px;
            background: #fff;
            border: 1.5px solid #1a1a1a;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            flex: 1;
            min-width: 120px;
        }

        .botao:hover { background: #00009C; color: #fff; border-color: #00009C; }
        .botao:disabled { opacity: 0.5; cursor: not-allowed; }

        #entrada-arquivo { display: none; }

        .barra-busca {
            width: 100%;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            padding: 10px 14px;
            border: 1.5px solid #1a1a1a;
            border-radius: 4px;
            background: #fff;
            margin-bottom: 16px;
            outline: none;
        }

        .barra-busca:focus { border-color: #00009C; }

        .contador {
            display: none;
            font-size: 12px;
            font-weight: 600;
            padding: 10px 14px;
            border: 1.5px solid #1a1a1a;
            border-radius: 4px;
            margin-bottom: 16px;
            background: #fff;
            transition: background 0.3s, color 0.3s;
        }

        .tabela-wrapper {
            background: #fff;
            border: 2px solid #1a1a1a;
            border-radius: 6px;
            overflow: hidden;
            min-height: 200px;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead tr { background: #CC0000; color: #fff; }

        thead th {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 10px 12px;
            text-align: left;
        }

        th:nth-child(1) { width: 8%; text-align: center; }
        th:nth-child(2) { width: 22%; }
        th:nth-child(3) { width: 12%; }
        th:nth-child(4) { width: 42%; }
        th:nth-child(5) { width: 16%; text-align: center; }

        tbody tr {
            border-bottom: 1px solid #e8e8e8;
            transition: background 0.15s;
            cursor: pointer;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f9f7f4; }

        tbody tr.conferido { background: #edf7f0; }
        tbody tr.conferido td { color: #2d7a4a; }

        td {
            font-size: 12px;
            padding: 10px 12px;
            vertical-align: middle;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        td.col-status { text-align: center; }
        td.col-qtd { text-align: center; font-weight: 600; }
        td.col-codigo { font-weight: 600; }

        .quadrado {
            width: 22px;
            height: 22px;
            border: 2px solid #ccc;
            border-radius: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
            background: #fff;
        }

        .quadrado.ok { background: #2d7a4a; border-color: #2d7a4a; color: #fff; }

        .estado-vazio {
            padding: 48px 24px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
            letter-spacing: 0.06em;
        }

        .legenda {
            font-size: 11px;
            color: #888;
            margin-bottom: 12px;
        }

        #info-arquivo {
            display: none;
            font-size: 11px;
            color: #888;
            margin-bottom: 10px;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .modal-overlay.aberto {
            display: flex;
            animation: fadeIn 0.18s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .modal {
            background: #fff;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            width: 100%;
            max-width: 480px;
            font-family: 'IBM Plex Mono', monospace;
            animation: slideUp 0.2s ease;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        /* Cabeçalho: DATA HORA */
        .modal-header {
            background: #CC0000;
            color: #fff;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header-titulo {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .modal-header-datetime {
            font-size: 11px;
            opacity: 0.9;
        }

        .modal-fechar {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            line-height: 1;
            padding: 0 0 0 12px;
            opacity: 0.8;
        }
        .modal-fechar:hover { opacity: 1; }

        /* Grade de campos inspirada no desenho */
        .modal-body {
            padding: 0;
        }

        .modal-row {
            display: grid;
            border-bottom: 1.5px solid #e8e8e8;
        }

        .modal-row:last-child { border-bottom: none; }

        /* LOC + MARCA */
        .modal-row.row-loc-marca {
            grid-template-columns: 1fr 1fr;
        }

        /* COD + NOME */
        .modal-row.row-cod-nome {
            grid-template-columns: 1fr;
        }

        /* MARCA (riscada) + FOTO */
        .modal-row.row-marca-foto {
            grid-template-columns: 1fr 1fr;
        }

        /* GTIN ANTIGO / NOVO */
        .modal-row.row-gtin {
            grid-template-columns: 1fr;
        }

        /* QTDO */
        .modal-row.row-qtdo {
            grid-template-columns: 1fr;
        }

        .modal-cell {
            padding: 10px 14px;
            border-right: 1.5px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .modal-cell:last-child { border-right: none; }

        .modal-cell-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #888;
        }

        .modal-cell-label.riscado {
            text-decoration: line-through;
            color: #bbb;
        }

        .modal-cell-value {
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            word-break: break-word;
            white-space: normal;
        }

        .modal-cell-input {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            padding: 0;
        }

        .modal-cell-input:focus {
            border-bottom: 1.5px solid #00009C;
        }

        /* Área de foto */
        .foto-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 14px;
            cursor: pointer;
            position: relative;
        }

        .foto-area input[type=file] {
            display: none;
        }

        .foto-placeholder {
            width: 80px;
            height: 60px;
            border: 2px dashed #ccc;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #ccc;
            background: #fafafa;
            transition: border-color 0.2s;
            overflow: hidden;
        }

        .foto-area:hover .foto-placeholder {
            border-color: #00009C;
        }

        .foto-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .foto-label {
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #888;
        }

        /* Linha inferior: BEST MARCA + FOTO */
        .modal-footer-info {
            background: #f7f5f2;
            border-top: 1.5px solid #e8e8e8;
            padding: 8px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: #aaa;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Botões do modal */
        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 2px solid #1a1a1a;
        }

        .modal-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .modal-btn-cancelar {
            background: #fff;
            color: #1a1a1a;
            border-right: 1px solid #e8e8e8;
        }

        .modal-btn-cancelar:hover { background: #f0ede8; }

        .modal-btn-confirmar {
            background: #00009C;
            color: #fff;
        }

        .modal-btn-confirmar:hover { background: #0000c8; }

        .modal-btn-confirmar.ja-conferido {
            background: #CC0000;
        }
        .modal-btn-confirmar.ja-conferido:hover { background: #ee0000; }

        /* ===== FIM MODAL ===== */

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .linha-botoes { flex-direction: column; }
            .botao { width: 100%; }

            thead { display: none; }

            tbody tr {
                display: grid;
                grid-template-columns: 32px 1fr 1fr;
                grid-template-areas:
                    "status codigo locacao"
                    "status nome nome"
                    "status qtd qtd";
                padding: 10px;
                border-bottom: 2px solid #eee;
                gap: 4px;
            }

            td { display: block; padding: 2px 4px !important; white-space: normal; }
            td.col-status { grid-area: status; display: flex; align-items: center; }
            td.col-locacao { grid-area: locacao; font-size: 10px; color: #888; text-align: right; }
            td.col-codigo { grid-area: codigo; font-size: 11px; }
            td.col-nome { grid-area: nome; font-weight: 600; font-size: 13px; }
            td.col-qtd { grid-area: qtd; text-align: left; }

            .modal { max-width: 100%; margin: 0; border-radius: 12px 12px 0 0; position: fixed; bottom: 0; left: 0; right: 0; }
            .modal-overlay.aberto { align-items: flex-end; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Estoque Hontec</h1>

    <div class="linha-botoes">
        <button class="botao" onclick="document.getElementById('entrada-arquivo').click()">Abrir Arquivo</button>
        <button class="botao" id="btn-ocultar" onclick="alternarConferidos()">Ocultar Conferidos</button>
        <button class="botao" onclick="exportarCSV()">⬇ Exportar</button>
        <button class="botao" id="btn-limpar" onclick="limpar()" style="display:none">Novo</button>
    </div>

    <input type="file" id="entrada-arquivo" accept=".csv" onchange="carregarCSV(this)">

    <div class="legenda" id="info-arquivo">Nenhum arquivo carregado</div>

    <input type="text" class="barra-busca" id="busca" placeholder="Buscar por código, nome ou locação..." oninput="filtrar()">

    <div class="contador" id="contador">
        <span id="cnt-conf">0</span> / <span id="cnt-total">0</span> itens conferidos
    </div>

    <div class="tabela-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Status</th>
                    <th>Locação</th>
                    <th>Código</th>
                    <th>Nome</th>
                    <th>Quantidade</th>
                </tr>
            </thead>
            <tbody id="corpo">
                <tr>
                    <td colspan="5" class="estado-vazio">Nenhum arquivo carregado — clique em Abrir CSV</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharModalFora(event)">
    <div class="modal" id="modal">

        <div class="modal-header">
            <span class="modal-header-titulo">Conferência de Item</span>
            <span class="modal-header-datetime" id="modal-datetime"></span>
            <button class="modal-fechar" onclick="fecharModal()">✕</button>
        </div>

        <div class="modal-body">

            <!-- Linha 1: LOC | MARCA -->
            <div class="modal-row row-loc-marca">
                <div class="modal-cell">
                    <span class="modal-cell-label">Locação</span>
                    <span class="modal-cell-value" id="modal-locacao">—</span>
                </div>
                <div class="modal-cell">
                    <span class="modal-cell-label">Marca</span>
                    <input class="modal-cell-input" id="modal-marca" type="text" placeholder="">
                </div>
            </div>

            <!-- Linha 2: COD + NOME -->
            <div class="modal-row row-cod-nome">
                <div class="modal-cell">
                    <span class="modal-cell-label">Código + Nome</span>
                    <span class="modal-cell-value" id="modal-cod-nome">—</span>
                </div>
            </div>

            <!-- Linha 3: MARCA (riscada) | FOTO -->
            <div class="modal-row row-marca-foto">
                <div class="modal-cell">
                    <span class="modal-cell-label riscado">Marca</span>
                    <span class="modal-cell-value" id="modal-nome-curto" style="color:#bbb; text-decoration:line-through; font-size:11px;">—</span>
                </div>
                <div class="foto-area" onclick="document.getElementById('foto-input').click()">
                    <div class="foto-placeholder" id="foto-placeholder">📷</div>
                    <span class="foto-label">Foto</span>
                    <input type="file" id="foto-input" accept="image/*" onchange="carregarFoto(this)">
                </div>
            </div>

            <!-- Linha 4: GTIN ANTIGO -->
            <div class="modal-row row-gtin">
                <div class="modal-cell">
                    <span class="modal-cell-label">GTIN Antigo</span>
                    <input class="modal-cell-input" id="modal-gtin-antigo" type="text" placeholder="">
                </div>
            </div>

            <!-- Linha 5: GTIN NOVO -->
            <div class="modal-row row-gtin">
                <div class="modal-cell">
                    <span class="modal-cell-label">GTIN Novo</span>
                    <input class="modal-cell-input" id="modal-gtin-novo" type="text" placeholder="">
                </div>
            </div>

            <!-- Linha 6: QTDO -->
            <div class="modal-row row-qtdo">
                <div class="modal-cell">
                    <span class="modal-cell-label">Quantidade</span>
                    <input class="modal-cell-input" id="modal-qtdo" type="number" min="0" step="any" placeholder="0">
                </div>
            </div>

        </div>

        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancelar" onclick="fecharModal()">Cancelar</button>
            <button class="modal-btn modal-btn-confirmar" id="modal-btn-confirmar" onclick="confirmarModal()">Confirmar</button>
        </div>

    </div>
</div>

<script>
let itens = [];
let ocultar = false;
let idxModalAtual = -1;

// ===== MODAL =====

function abrirModal(globalIdx) {
    idxModalAtual = globalIdx;
    const item = itens[globalIdx];

    // Data e hora atuais
    const agora = new Date();
    const dt = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('modal-datetime').textContent = dt;

    // Preencher campos
    document.getElementById('modal-locacao').textContent = item.locacao || '—';
    document.getElementById('modal-cod-nome').textContent = `${item.codigo} — ${item.nome}`;
    document.getElementById('modal-nome-curto').textContent = item.nome;

    // Campos editáveis
    document.getElementById('modal-marca').value      = item.marca      || '';
    document.getElementById('modal-gtin-antigo').value = item.gtinAntigo || '';
    document.getElementById('modal-gtin-novo').value   = item.gtinNovo   || '';
    document.getElementById('modal-qtdo').value        = item.qtdConferida != null ? item.qtdConferida : (item.qtd % 1 === 0 ? item.qtd.toFixed(0) : item.qtd.toFixed(2));

    // Foto
    const ph = document.getElementById('foto-placeholder');
    if (item.foto) {
        ph.innerHTML = `<img src="${item.foto}" alt="foto">`;
    } else {
        ph.innerHTML = '📷';
    }

    // Botão confirmar
    const btnConf = document.getElementById('modal-btn-confirmar');
    if (item.conferido) {
        btnConf.textContent = 'Desmarcar';
        btnConf.classList.add('ja-conferido');
    } else {
        btnConf.textContent = 'Confirmar';
        btnConf.classList.remove('ja-conferido');
    }

    document.getElementById('modal-overlay').classList.add('aberto');
    document.getElementById('modal-marca').focus();
}

function fecharModal() {
    document.getElementById('modal-overlay').classList.remove('aberto');
    // Limpa foto
    document.getElementById('foto-input').value = '';
    idxModalAtual = -1;
}

function fecharModalFora(e) {
    if (e.target === document.getElementById('modal-overlay')) fecharModal();
}

function carregarFoto(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const src = e.target.result;
        document.getElementById('foto-placeholder').innerHTML = `<img src="${src}" alt="foto">`;
        if (idxModalAtual >= 0) itens[idxModalAtual].foto = src;
    };
    reader.readAsDataURL(input.files[0]);
}

function confirmarModal() {
    if (idxModalAtual < 0) return;

    const item = itens[idxModalAtual];

    // Salvar dados extras
    item.marca       = document.getElementById('modal-marca').value.trim();
    item.gtinAntigo  = document.getElementById('modal-gtin-antigo').value.trim();
    item.gtinNovo    = document.getElementById('modal-gtin-novo').value.trim();
    const qtdVal     = document.getElementById('modal-qtdo').value;
    item.qtdConferida = qtdVal !== '' ? parseFloat(qtdVal) : null;

    // Toggle conferido
    item.conferido = !item.conferido;

    // Atualizar linha na tabela
    const tr = document.getElementById(`linha-${idxModalAtual}`);
    const q  = document.getElementById(`q-${idxModalAtual}`);

    if (tr) {
        if (item.conferido) {
            tr.classList.add('conferido');
            q.classList.add('ok');
            q.textContent = '✓';
            if (ocultar) setTimeout(() => { tr.style.display = 'none'; }, 300);
        } else {
            tr.classList.remove('conferido');
            q.classList.remove('ok');
            q.textContent = '';
            tr.style.display = '';
        }
    }

    atualizarContador();
    fecharModal();
}

// ===== CSV =====

function carregarCSV(input) {
    const arquivo = input.files[0];
    if (!arquivo) return;

    document.getElementById('info-arquivo').style.display = 'block';
    document.getElementById('info-arquivo').textContent = `Carregando ${arquivo.name}...`;

    const leitor = new FileReader();
    leitor.onload = (e) => processarCSV(e.target.result, arquivo.name);
    leitor.readAsText(arquivo, 'UTF-8');
}

function limparAspas(val) {
    if (!val) return '';
    return val.replace(/^"|"$/g, '').trim();
}

function processarCSV(texto, nomeArquivo) {
    const linhas = texto.split(/\r?\n/).filter(l => l.trim());
    if (linhas.length < 2) { alert('Arquivo CSV vazio ou inválido.'); return; }

    const sep = linhas[0].includes('|') ? '|' : ',';
    const cabecalho = linhas[0].split(sep).map(limparAspas);
    const idx = (nome) => cabecalho.findIndex(c => c.toUpperCase().includes(nome.toUpperCase()));

    const iCodigo     = idx('ITEM_ESTOQUE_PUB');
    const iNome       = idx('DES_ITEM_ESTOQUE');
    const iQtd        = idx('QTD_CONTABIL');
    const iZona       = idx('LOCACAO_ZONA');
    const iRua        = idx('LOCACAO_RUA');
    const iEstante    = idx('LOCACAO_ESTANTE');
    const iPrateleira = idx('LOCACAO_PRATELEIRA');
    const iNumero     = idx('LOCACAO_NUMERO');

    itens = [];

    for (let i = 1; i < linhas.length; i++) {
        const cols = linhas[i].split(sep).map(limparAspas);
        if (cols.length < 3) continue;

        const locacao = [iZona, iRua, iEstante, iPrateleira, iNumero]
            .map(x => x >= 0 ? cols[x] : '')
            .filter(Boolean).join('.');

        const codigo = iCodigo >= 0 ? cols[iCodigo] : `item-${i}`;
        const nome   = iNome >= 0   ? cols[iNome]   : '---';
        const qtd    = parseFloat((iQtd >= 0 ? cols[iQtd] : '0').replace(',', '.')) || 0;

        itens.push({
            locacao, codigo, nome, qtd,
            conferido: false,
            marca: '', gtinAntigo: '', gtinNovo: '',
            qtdConferida: null, foto: null
        });
    }

    renderizarTabela(itens);
    document.getElementById('info-arquivo').textContent = `📄 ${nomeArquivo} — ${itens.length} itens`;
    document.getElementById('btn-limpar').style.display = 'inline-block';
    atualizarContador();
}

function renderizarTabela(lista) {
    const corpo = document.getElementById('corpo');
    corpo.innerHTML = '';

    if (lista.length === 0) {
        corpo.innerHTML = '<tr><td colspan="5" class="estado-vazio">Nenhum item encontrado</td></tr>';
        return;
    }

    lista.forEach((item) => {
        const globalIdx = itens.indexOf(item);
        const tr = document.createElement('tr');
        tr.id = `linha-${globalIdx}`;
        if (item.conferido) tr.classList.add('conferido');
        if (ocultar && item.conferido) tr.style.display = 'none';

        tr.onclick = () => abrirModal(globalIdx);
        tr.style.cursor = 'pointer';

        const qtdFormatada = item.qtd % 1 === 0 ? item.qtd.toFixed(0) : item.qtd.toFixed(2);

        tr.innerHTML = `
            <td class="col-status">
                <div class="quadrado ${item.conferido ? 'ok' : ''}" id="q-${globalIdx}">
                    ${item.conferido ? '✓' : ''}
                </div>
            </td>
            <td class="col-locacao" title="${item.locacao}">${item.locacao || '---'}</td>
            <td class="col-codigo">${item.codigo}</td>
            <td class="col-nome" title="${item.nome}">${item.nome}</td>
            <td class="col-qtd">${qtdFormatada}</td>
        `;
        corpo.appendChild(tr);
    });

    document.getElementById('contador').style.display = 'block';
}

function atualizarContador() {
    const conf  = itens.filter(i => i.conferido).length;
    const total = itens.length;
    document.getElementById('cnt-conf').textContent  = conf;
    document.getElementById('cnt-total').textContent = total;

    const el = document.getElementById('contador');
    if (total === 0) return;
    if (conf === 0) {
        el.style.background = '#fff0f0'; el.style.color = '#CC0000'; el.style.borderColor = '#CC0000';
    } else if (conf === total) {
        el.style.background = '#edf7f0'; el.style.color = '#2d7a4a'; el.style.borderColor = '#2d7a4a';
    } else {
        el.style.background = '#fff9eb'; el.style.color = '#f39c12'; el.style.borderColor = '#f39c12';
    }
}

function filtrar() {
    const busca = document.getElementById('busca').value.toLowerCase().trim();
    const filtrados = busca === ''
        ? itens
        : itens.filter(i =>
            i.codigo.toLowerCase().includes(busca) ||
            i.nome.toLowerCase().includes(busca) ||
            i.locacao.toLowerCase().includes(busca)
        );
    renderizarTabela(filtrados);
}

function alternarConferidos() {
    ocultar = !ocultar;
    document.getElementById('btn-ocultar').textContent = ocultar ? 'Mostrar Todos' : 'Ocultar Conferidos';
    document.querySelectorAll('#corpo tr').forEach(tr => {
        const idx = parseInt(tr.id?.replace('linha-', ''));
        if (isNaN(idx)) return;
        tr.style.display = (ocultar && itens[idx]?.conferido) ? 'none' : '';
    });
}

function exportarCSV() {
    if (itens.length === 0) { alert('Carregue um arquivo primeiro!'); return; }

    const linhas = ['STATUS|LOCACAO|CODIGO|NOME|QUANTIDADE|QTD_CONFERIDA|MARCA|GTIN_ANTIGO|GTIN_NOVO'];
    itens.forEach(i => {
        const qtdC = i.qtdConferida != null ? i.qtdConferida : '';
        linhas.push(`${i.conferido ? 'OK' : 'PENDENTE'}|${i.locacao}|${i.codigo}|${i.nome}|${i.qtd}|${qtdC}|${i.marca}|${i.gtinAntigo}|${i.gtinNovo}`);
    });

    const blob = new Blob([linhas.join('\n')], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'estoque_conferido.csv';
    link.click();
}

function limpar() {
    itens = [];
    document.getElementById('corpo').innerHTML = '<tr><td colspan="5" class="estado-vazio">Nenhum arquivo carregado — clique em Abrir CSV</td></tr>';
    document.getElementById('info-arquivo').textContent = 'Nenhum arquivo carregado';
    document.getElementById('contador').style.display = 'none';
    document.getElementById('btn-limpar').style.display = 'none';
    document.getElementById('busca').value = '';
    document.getElementById('entrada-arquivo').value = '';
}

// Fechar modal com ESC
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') fecharModal();
});
</script>
</body>
</html>
